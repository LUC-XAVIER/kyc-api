name: CI

# Every push and PR. Deployment is a separate workflow that runs only after
# this one is green on main — nothing reaches production unverified.
on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

concurrency:
  # A new push supersedes an in-flight run on the same ref; the old result
  # is already stale by the time it lands.
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (lint + tests)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      db:
        # pgvector, not stock postgres: face_embeddings.vector needs the
        # extension at table-creation time.
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: kyc
          POSTGRES_PASSWORD: kyc
          POSTGRES_DB: kyc
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U kyc -d kyc"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql+psycopg://kyc:kyc@localhost:5432/kyc
      ENVIRONMENT: test
      # Throwaway values: CI runs no production data, and hardcoding them
      # keeps the suite from depending on repository secrets. The 32-byte
      # length matters — the production guard rejects anything shorter, and
      # ENCRYPTION_KEY must decode to exactly 32 bytes.
      SECRET_KEY: ci-secret-key-32-bytes-exactly!!
      API_KEY_PEPPER: ci-api-key-pepper-32-bytes-exact!
      ENCRYPTION_KEY: a3ljLWNpLWtleS0zMi1ieXRlcy1leGFjdGx5ISEhISE=

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          # The ML stack is multi-gigabyte; without a cache key tied to the
          # lock file every run re-downloads torch and tensorflow.
          cache-dependency-glob: uv.lock

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        # Both extras together, always: installing one alone drops the other.
        run: uv sync --frozen --extra ml --extra dev

      - name: Lint
        run: uv run ruff check app/ tests/ alembic/

      - name: Apply migrations
        # Not create_all: this exercises the real migration chain, which is
        # what production will run.
        run: uv run alembic upgrade head

      - name: Seed reference data
        # The four subscription plans are reference data the app can't
        # function without — MFI signup resolves a plan by name. Idempotent,
        # and the same script production runs on first boot.
        run: uv run python -m scripts.seed_plans

      - name: Tests
        run: uv run pytest -q

  frontend:
    name: Frontend (build + tests)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: KYC-Frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          # Angular 19 is pinned deliberately — Angular 20+ needs Node 22,
          # and the project targets Node 20.
          node-version: "20"
          cache: npm
          cache-dependency-path: KYC-Frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Tests
        env:
          CHROME_BIN: /usr/bin/google-chrome
        # ChromeHeadlessNoSandbox (see karma.conf.js): the runner cannot start
        # Chrome's sandbox, so the plain headless browser aborts before any
        # test runs.
        run: npx ng test --watch=false --browsers=ChromeHeadlessNoSandbox
