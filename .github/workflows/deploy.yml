name: Deploy

# Deploys main to the VPS. Gated on CI: workflow_run fires only after the CI
# workflow finishes, and the conclusion check below drops anything that
# wasn't green. "Every push deploys" must mean "every push that passes",
# because there is real client biometric data on the other end.
on:
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types: [completed]
  # Manual redeploy / rollback without pushing a commit.
  workflow_dispatch:
    inputs:
      ref:
        description: "Commit SHA or tag to deploy"
        required: false

concurrency:
  # Never let two deploys race onto the same host.
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Build image and deploy
    runs-on: ubuntu-latest
    timeout-minutes: 45
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    # Set this up in Settings > Environments to require a manual approval
    # before production deploys, and to hold the secrets below.
    environment: production

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.event.workflow_run.head_sha || github.sha }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Lower-case the image name
        # GHCR (and Docker generally) reject upper-case repository names, but
        # github.repository preserves the owner's casing. Compute a lower-case
        # image path once and reuse it.
        id: image
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          # Tagged by SHA as well as latest, so a rollback is a redeploy of a
          # known tag rather than an archaeology exercise.
          tags: |
            ${{ steps.image.outputs.name }}:latest
            ${{ steps.image.outputs.name }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1
        env:
          # The commit being deployed, forwarded to the remote shell so the
          # host checks out the same source the api image was built from.
          DEPLOY_SHA: ${{ inputs.ref || github.event.workflow_run.head_sha || github.sha }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: DEPLOY_SHA
          script: |
            set -euo pipefail
            cd ${{ secrets.VPS_APP_DIR }}
            # The api ships as a prebuilt GHCR image, but the proxy (Angular
            # dashboard + Caddy) is built from source on the host. Move the
            # working tree onto the exact deployed commit first, or the
            # rebuilt frontend would bake whatever stale source was there.
            git -C .. fetch --quiet origin
            git -C .. checkout --quiet --force "$DEPLOY_SHA"
            echo "${{ secrets.GITHUB_TOKEN }}" | \
              docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker compose -f docker-compose.prod.yml pull api
            # Migrations run before the new image serves traffic. They are
            # additive by convention; a destructive one needs a maintenance
            # window, not an automatic deploy.
            docker compose -f docker-compose.prod.yml run --rm api \
              alembic upgrade head
            # Idempotent: seeds the subscription plans on first deploy,
            # updates them in place on later ones.
            docker compose -f docker-compose.prod.yml run --rm api \
              python -m scripts.seed_plans
            # Idempotent: creates the platform admin on first deploy and
            # leaves an existing one untouched (its PIN is never reset here,
            # so a dashboard PIN change survives). Override the credentials
            # with ADMIN_EMAIL / ADMIN_PIN in the host .env.
            docker compose -f docker-compose.prod.yml run --rm api \
              python -m scripts.seed_admin
            docker compose -f docker-compose.prod.yml up -d --no-deps api
            # Rebuild the dashboard from the freshly checked-out source and
            # roll it out. Without this the api updates but the UI (camera
            # facing, loading overlay, charts) stays on the previous build.
            docker compose -f docker-compose.prod.yml up -d --no-deps --build proxy
            docker image prune -f

      - name: Verify the deployment is serving
        # A deploy that silently rolls a broken image is worse than a failed
        # one: this fails the run so the notification is truthful.
        run: |
          for i in $(seq 1 12); do
            if curl -fsS "https://${{ secrets.APP_DOMAIN }}/api/v1/health" \
                 | grep -q '"status"'; then
              echo "Health check passed"; exit 0
            fi
            echo "Attempt $i failed; retrying in 5s"; sleep 5
          done
          echo "Health check never passed — the deploy is not serving"; exit 1
