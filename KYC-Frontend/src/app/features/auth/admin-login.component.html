<div class="admin-login">
  <form class="alogin-card" (submit)="$event.preventDefault(); submit()">
    <div class="alogin-card__brand">
      <div class="alogin-card__logo">X</div>
      <span>Openxtech</span>
      <span class="alogin-card__tag">ADMIN</span>
    </div>

    <h2 class="alogin-card__title">Platform administrator</h2>
    <p class="alogin-card__sub">
      Sign in to oversee every MFI on the platform.
    </p>

    <label class="afield-label">Email</label>
    <input
      class="afield"
      type="email"
      autocomplete="username"
      placeholder="admin@openxtech.cm"
      [value]="email()"
      (input)="email.set($any($event.target).value)"
    />

    <label class="afield-label">PIN</label>
    <input
      class="afield"
      type="password"
      inputmode="numeric"
      autocomplete="current-password"
      placeholder="••••••"
      [value]="pin()"
      (input)="pin.set($any($event.target).value)"
    />

    @if (error()) {
      <div class="alogin-error">{{ error() }}</div>
    }

    <button type="submit" class="alogin-submit" [disabled]="loading()">
      {{ loading() ? 'Signing in…' : 'Sign in' }}
    </button>

    <div class="alogin-foot">Restricted access · Openxtech staff only</div>
  </form>
</div>
